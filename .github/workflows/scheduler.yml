name: Daily RAG refresh

on:
  # Runs every day at 10:00 AM India Standard Time (04:30 UTC).
  schedule:
    - cron: "30 4 * * *"
  # Allow manual runs from the GitHub Actions UI.
  workflow_dispatch: {}

jobs:
  refresh-rag-data:
    runs-on: ubuntu-latest

    env:
      # Optional: set this in your repo/environment secrets if you want
      # Phase 3 evaluation (which uses Groq) to run as well.
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Phase 3 refresh (crawl + index + optional eval)
        run: |
          python -m src.phase3.refresh

